    <h1>Sign up for Project X 2026 🇦🇹</h1>
    <h2>23-26 of July 2026 in Austria</h2>

    <form id="registration-form">
        <label>
            First name</label><br>
        <input type="text" name="name" required><br>

        <label>
            Email</label><br>
        <input type="email" name="email" required><br>

        <label>
            Where are you from? </label><br>
        <input list="countries" name="country"><br>

        <label>
            Feel free to leave a sweet message for your fellow PX ambassadors ❤️</label><br>
        <textarea name="message" id="long-text"></textarea><br>

        <label style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
